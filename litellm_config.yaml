# If you see OpenRouter/Google error 499 "CANCELLED": the upstream call was aborted
# (browser closed SSE, idle timeout, user navigated away) or Google cancelled a stuck
# request. Retries below help transient cases; client-side aborts will still fail.

.openrouter_shared: &openrouter_shared
  api_base: https://openrouter.ai/api/v1
  api_key: os.environ/OPENROUTER_API_KEY
  custom_llm_provider: openai
  # Long agent + tool runs; raise if you hit read timeouts
  timeout: 600
  stream_timeout: 600
  extra_headers:
    HTTP-Referer: "https://www.k-dense.ai"
    X-Title: "Kady-Expert"

model_list:
  # ── Gemini models ──
  - model_name: gemini-3.1-pro-preview
    litellm_params:
      <<: *openrouter_shared
      model: google/gemini-3.1-pro-preview
  - model_name: gemini-3-flash-preview
    litellm_params:
      <<: *openrouter_shared
      model: google/gemini-3-flash-preview
  - model_name: gemini-3.1-flash-lite-preview
    litellm_params:
      <<: *openrouter_shared
      model: google/gemini-3.1-flash-lite-preview

router_settings:
  # Retry failed routing attempts (helps flaky upstream / transient errors)
  num_retries: 4
  model_group_alias:
    # ADK / LiteLLM appends "-customtools" when tool calling is enabled — route to the base deployment.
    "gemini-3.1-pro-preview-customtools": "gemini-3.1-pro-preview"
    "gemini-3-flash-preview-customtools": "gemini-3-flash-preview"
    "gemini-3-flash-preview": "gemini-3-flash-preview"
    "gemini-3.1-flash-lite-preview-customtools": "gemini-3-flash-preview"
    # Gemini CLI internal model IDs -> LiteLLM model_name (see @google/gemini-cli-core defaultModelConfigs)
    "gemini-2.5-pro": "gemini-3.1-pro-preview"
    "gemini-2.5-flash": "gemini-3-flash-preview"
    "gemini-2.5-flash-lite": "gemini-3-flash-preview"
    "gemini-3-pro-preview": "gemini-3.1-pro-preview"

general_settings:
  master_key: sk-litellm-local
